[package]
name = "stryke-duckdb"
version = "0.19.0"
description = "DuckDB embedded analytical SQL engine for stryke. Direct-query parquet/CSV/JSON from disk or URL. cdylib loaded in-process — :memory: dbs now persist across calls."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-duckdb"
edition = "2026"

[ffi]
lib-name = "stryke_duckdb"
namespace = "DuckDB"
exports = [
    "duckdb__version",
    "duckdb__ping",
    "duckdb__inspect",
    "duckdb__query",
    "duckdb__execute",
    "duckdb__exec",
    "duckdb__dump",
    "duckdb__import",
    "duckdb__export",
    "duckdb__tables",
    "duckdb__schema",
    "duckdb__appender",
    "duckdb__explain",
    "duckdb__views",
    "duckdb__functions",
    "duckdb__settings",
    "duckdb__extensions",
    "duckdb__quote_identifier",
    "duckdb__attach",
    "duckdb__detach",
    "duckdb__copy_from",
    "duckdb__create_index",
    "duckdb__drop",
    "duckdb__indexes",
    "duckdb__constraints",
    "duckdb__table_info",
    "duckdb__database_size",
    "duckdb__appender_columns",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
